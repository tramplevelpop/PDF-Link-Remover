name: Hamedoz PDF Worker

on:
  schedule:
    - cron: '*/5 * * * *'  # هيشتغل أوتوماتيك كل 5 دقائق
  workflow_dispatch:      # عشان تقدر تشغله يدوي لو حبيت

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements_worker.txt

      - name: Run Worker Task
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          TG_TARGET_CHAT: ${{ secrets.TG_TARGET_CHAT }}
          TG_SESSION: ${{ secrets.TG_SESSION }}
        run: python worker_node.py
